<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Manija Awards 2026 – Diplomas</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Arial Black',Arial,sans-serif; }

#stage {
  width:1920px; height:1080px;
  transform-origin:top left;
  position:relative;
  background:#000;
}

/* ── Particle canvas (bottom layer) ── */
#bgCanvas {
  position:absolute; inset:0;
  width:1920px; height:1080px;
  z-index:1; pointer-events:none;
}

/* ── Content layer ── */
#content { position:absolute; inset:0; z-index:2; }

/* ── INTRO ── */
#intro {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
}
#intro-manija {
  font-size:200px; font-weight:900; letter-spacing:24px;
  color:#fff;
  text-shadow: 0 0 40px #ff2edb, 0 0 80px #ff2edb, 0 0 160px rgba(255,46,219,0.5);
  transform: translateY(-60px);
  opacity:0;
}
#intro-awards {
  font-size:120px; font-weight:900; letter-spacing:30px;
  background: linear-gradient(90deg,#ff2edb,#cc00ff,#00d4ff,#ff2edb);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter: drop-shadow(0 0 30px rgba(255,46,219,0.9));
  transform: translateY(60px); opacity:0;
}
#intro-year {
  font-size:48px; letter-spacing:20px; color:rgba(255,255,255,0.5);
  margin-top:16px; opacity:0;
}
#intro-sub {
  font-size:28px; letter-spacing:10px; color:rgba(255,46,219,0.6);
  margin-top:8px; opacity:0;
}

/* ── Flash overlay ── */
#flash {
  position:absolute; inset:0;
  background:#fff;
  opacity:0; pointer-events:none; z-index:20;
}

/* ── DIPLOMA SLIDE ── */
.dslide {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
}
.dcard {
  position:relative;
  width:1160px; height:870px;
  transform:scale(0.85) translateY(60px);
  border-radius:6px;
  /* glow ring pulsed via JS */
  box-shadow: 0 0 0px rgba(255,46,219,0);
}
.dcard img {
  width:100%; height:100%;
  object-fit:fill;
  border-radius:6px;
  display:block;
}
/* Neon overlays ON the diploma */
.d-name {
  position:absolute;
  /* línea en blanco bajo "ESTE DIPLOMA SE OTORGA A:" → 58% */
  top:58%; left:50%;
  transform:translateX(-50%) translateY(-50%);
  width:900px; text-align:center;
  font-size:52px; font-weight:900; letter-spacing:8px;
  text-transform:uppercase;
  background: linear-gradient(90deg,#ff2edb,#cc00ff,#7b2fff,#cc00ff,#ff2edb);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter: drop-shadow(0 0 14px rgba(255,46,219,0.95)) drop-shadow(0 2px 6px rgba(120,0,255,0.8));
  opacity:0; white-space:nowrap; overflow:hidden;
}
.d-cat {
  position:absolute;
  /* centro del rectángulo de categoría → 70% */
  top:70%; left:50%;
  transform:translateX(-50%) translateY(-50%);
  width:780px; text-align:center;
  font-size:36px; font-weight:900; letter-spacing:5px;
  text-transform:uppercase;
  color:#fff;
  text-shadow: 0 0 20px #ff2edb, 0 0 40px rgba(255,46,219,0.7), 0 0 2px #000;
  opacity:0; white-space:nowrap; overflow:hidden;
}
.d-votes {
  position:absolute;
  top:84%; left:50%;
  transform:translateX(-50%);
  font-size:22px; font-weight:700; letter-spacing:6px;
  color:#00d4ff;
  text-shadow: 0 0 16px #00d4ff, 0 0 32px rgba(0,212,255,0.6);
  opacity:0;
}

/* ── SPECIAL TRANSITION ── */
#spec-trans {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background: radial-gradient(ellipse at center, #1a1000 0%, #000 100%);
  opacity:0; pointer-events:none;
}
#spec-trans h2 {
  font-size:96px; font-weight:900; letter-spacing:14px;
  background: linear-gradient(90deg,#FFD700,#FFF8DC,#FFC107,#FF8C00,#FFD700);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter: drop-shadow(0 0 40px rgba(255,215,0,0.8));
  margin-bottom:20px;
}
#spec-trans p {
  font-size:36px; letter-spacing:8px;
  color:rgba(255,215,0,0.6);
}

/* ── SPECIAL SLIDE ── */
.sslide {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
}
.scard {
  position:relative;
  width:1160px; height:870px;
  transform:scale(0.85) translateY(60px);
  border-radius:6px;
  box-shadow: 0 0 60px rgba(255,215,0,0.4), 0 0 120px rgba(255,165,0,0.2);
}
.scard img { width:100%; height:100%; object-fit:fill; border-radius:6px; display:block; }
/* Gold tint overlay */
.scard::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(to bottom,
    rgba(255,215,0,0.08) 0%,
    rgba(255,165,0,0.04) 50%,
    rgba(255,215,0,0.08) 100%
  );
  border-radius:6px;
  pointer-events:none;
}
.s-badge {
  position:absolute;
  top:10%; left:50%;
  transform:translateX(-50%);
  font-size:22px; letter-spacing:10px; font-weight:700;
  color:rgba(255,215,0,0.7);
  text-transform:uppercase;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  opacity:0;
}
.s-name {
  position:absolute;
  top:58%; left:50%;
  transform:translateX(-50%) translateY(-50%);
  width:900px; text-align:center;
  font-size:58px; font-weight:900; letter-spacing:10px;
  text-transform:uppercase;
  background: linear-gradient(90deg,#FFD700,#FFF8DC,#FFD700,#FFC107,#FFD700);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter: drop-shadow(0 0 20px rgba(255,215,0,1)) drop-shadow(0 0 40px rgba(255,165,0,0.7));
  opacity:0; white-space:nowrap; overflow:hidden;
}
.s-cat {
  position:absolute;
  top:70%; left:50%;
  transform:translateX(-50%) translateY(-50%);
  width:780px; text-align:center;
  font-size:36px; font-weight:900; letter-spacing:5px;
  text-transform:uppercase;
  color:#FFD700;
  text-shadow: 0 0 20px #FFD700, 0 0 40px rgba(255,215,0,0.7), 0 0 2px #000;
  opacity:0; white-space:nowrap;
}
.s-premio {
  position:absolute;
  top:86%; left:50%;
  transform:translateX(-50%);
  font-size:20px; font-weight:700; letter-spacing:8px;
  color:#FFC107;
  text-shadow: 0 0 16px rgba(255,193,7,0.8);
  opacity:0;
}

/* ── OUTRO ── */
#outro {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
}
#outro h1 {
  font-size:88px; font-weight:900; letter-spacing:10px; text-align:center;
  background: linear-gradient(90deg,#ff2edb,#cc00ff,#00d4ff,#ff2edb);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter: drop-shadow(0 0 30px rgba(255,46,219,0.8));
  opacity:0;
}
#outro p {
  font-size:36px; letter-spacing:12px; margin-top:20px;
  color:rgba(255,255,255,0.5); opacity:0;
}
#outro .club {
  font-size:28px; letter-spacing:8px; margin-top:12px;
  color:rgba(255,46,219,0.5); opacity:0;
}

/* ── Counter badge (top right) ── */
#counter {
  position:absolute;
  top:32px; right:60px;
  font-size:26px; font-weight:700; letter-spacing:4px;
  color:rgba(255,255,255,0.35);
  z-index:10;
}
/* ── Category label (top center during diploma) ── */
#topLabel {
  position:absolute;
  top:28px; left:50%;
  transform:translateX(-50%);
  font-size:18px; letter-spacing:10px;
  color:rgba(255,46,219,0.5);
  text-transform:uppercase;
  z-index:10; opacity:0;
}
</style>
</head>
<body>
<div id="stage">
  <!-- Particle background -->
  <canvas id="bgCanvas"></canvas>

  <div id="content">
    <!-- Intro -->
    <div id="intro">
      <div id="intro-manija">MANIJA</div>
      <div id="intro-awards">AWARDS</div>
      <div id="intro-year">2 0 2 6</div>
      <div id="intro-sub">PRESENTACIÓN DE GANADORES</div>
    </div>

    <!-- Diploma slides (built dynamically) -->

    <!-- Special transition -->
    <div id="spec-trans">
      <h2>★ CATEGORÍAS ESPECIALES ★</h2>
      <p>RECONOCIMIENTOS EXTRAORDINARIOS</p>
    </div>

    <!-- Special slides (built dynamically) -->

    <!-- Outro -->
    <div id="outro">
      <h1>¡FELICITACIONES<br>A TODOS LOS<br>GANADORES!</h1>
      <p>PREMIOS MANIJA AWARDS 2026</p>
      <div class="club">CLUB LOS MANIJAS · SANTIAGO DE CHILE</div>
    </div>

    <!-- Flash -->
    <div id="flash"></div>

    <!-- HUD -->
    <div id="counter"></div>
    <div id="topLabel">MANIJA AWARDS 2026</div>
  </div>
</div>

<script>
// ── Constants ──
const W = 1920, H = 1080;
const FPS = 30;

// Frame budgets
const INTRO_F     = 100;   // 3.3s cinematic intro
const DIP_F       = 260;   // 8.6s per regular diploma
const SPEC_TRANS_F= 100;   // 3.3s special transition
const SPEC_F      = 280;   // 9.3s per special diploma
const OUTRO_F     = 100;   // 3.3s outro

// ── Data (placeholders, replaced via postMessage) ──
let categories = [
  { categoryName:'Mejor Momento', winnerName:'GANADOR DEMO', winnerDescription:'', votes:10 },
];
let specialCategories = [];

// ── State ──
let frame   = 0;
let paused  = false;
let rafId   = 0;
let built   = false;

// ── DOM refs ──
const stage     = document.getElementById('stage');
const intro     = document.getElementById('intro');
const specTrans = document.getElementById('spec-trans');
const outro     = document.getElementById('outro');
const flash     = document.getElementById('flash');
const counter   = document.getElementById('counter');
const topLabel  = document.getElementById('topLabel');
const bgCanvas  = document.getElementById('bgCanvas');
const ctx       = bgCanvas.getContext('2d');
bgCanvas.width  = W;
bgCanvas.height = H;

// ── Scale stage to viewport ──
function scaleStage() {
  const sx = window.innerWidth  / W;
  const sy = window.innerHeight / H;
  const s  = Math.min(sx, sy);
  stage.style.transform = `scale(${s})`;
  stage.style.marginLeft = ((window.innerWidth  - W * s) / 2) + 'px';
  stage.style.marginTop  = ((window.innerHeight - H * s) / 2) + 'px';
}
scaleStage();
window.addEventListener('resize', scaleStage);

// ── Easing helpers ──
function clamp(v,a,b)   { return Math.max(a,Math.min(b,v)); }
function fadeIn(f,s,d)  { return clamp((f-s)/d,0,1); }
function fadeOut(f,s,d) { return clamp(1-(f-s)/d,0,1); }
function ease(t)        { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeIn(f,s,d)  { return ease(fadeIn(f,s,d)); }

// ── Mobile detection → less particles ──
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
const PARTICLE_COUNT = isMobile ? 30 : 70;

// ── Particle system (reducido vs v1) ──
const particles = [];
for (let i=0; i<PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random()*W, y: Math.random()*H,
    vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5,
    r: Math.random()*1.8+0.4,
    hue: Math.random()*60 + 280,
    a: Math.random()*0.5+0.15,
    life: Math.random()*180+80,
    age: Math.floor(Math.random()*80),
  });
}

// ── Pre-baked background (dibujamos el gradiente estático 1 vez) ──
const offBg = document.createElement('canvas');
offBg.width = W; offBg.height = H;
const octx = offBg.getContext('2d');
const bg0 = octx.createRadialGradient(W/2,H/2,0,W/2,H/2,900);
bg0.addColorStop(0,'#0d0020'); bg0.addColorStop(0.5,'#080015'); bg0.addColorStop(1,'#000');
octx.fillStyle = bg0; octx.fillRect(0,0,W,H);

// ── Blobs: solo 2 (vs 5 antes) ──
const blobs = [
  { px:0.3, py:0.35, hue:300 },
  { px:0.7, py:0.65, hue:260 },
];

function drawBg(f) {
  // Copiar fondo pre-baked (1 drawImage vs fillRect+radialGradient)
  ctx.drawImage(offBg, 0, 0);

  // Blobs animados (2 blobs en vez de 5)
  if (!isMobile) {
    blobs.forEach((b,i) => {
      const bx = Math.sin(f*0.016 + i*1.6)*280 + W*b.px;
      const by = Math.cos(f*0.011 + i*1.2)*160 + H*b.py;
      const br = 200;
      const g  = ctx.createRadialGradient(bx,by,0,bx,by,br);
      g.addColorStop(0,`hsla(${b.hue},100%,55%,0.10)`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
    });
  }

  // Partículas
  particles.forEach(p => {
    p.age++; p.x += p.vx; p.y += p.vy;
    if (p.x<0) p.x=W; if (p.x>W) p.x=0;
    if (p.y<0) p.y=H; if (p.y>H) p.y=0;
    if (p.age > p.life) { p.age=0; p.x=Math.random()*W; p.y=Math.random()*H; }
    const alpha = p.a * Math.sin(p.age/p.life * Math.PI);
    if (alpha < 0.02) return;
    ctx.fillStyle = `hsla(${p.hue},100%,75%,${alpha})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
}

// ── Build DOM slides dynamically ──
function buildSlides() {
  if (built) return;
  built = true;

  const content = document.getElementById('content');

  // Regular diploma slides
  categories.forEach((cat, i) => {
    const slide = document.createElement('div');
    slide.className = 'dslide';
    slide.id = `ds${i}`;
    slide.innerHTML = `
      <div class="dcard" id="dc${i}">
        <img src="/Font.jpeg?v=4" alt="diploma" draggable="false">
        <div class="d-name" id="dn${i}">${cat.winnerName.toUpperCase()}</div>
        <div class="d-cat"  id="dcat${i}">${cat.categoryName.toUpperCase()}</div>
        <div class="d-votes" id="dv${i}">▌ ${cat.votes} VOTOS ▌</div>
      </div>`;
    content.insertBefore(slide, specTrans);
  });

  // Special diploma slides
  specialCategories.forEach((cat, i) => {
    const slide = document.createElement('div');
    slide.className = 'sslide';
    slide.id = `ss${i}`;
    slide.innerHTML = `
      <div class="scard" id="sc${i}">
        <img src="/Font.jpeg?v=4" alt="diploma" draggable="false">
        <div class="s-badge" id="sb${i}">★ PREMIO ESPECIAL ★</div>
        <div class="s-name"  id="sn${i}">${cat.winnerName.toUpperCase()}</div>
        <div class="s-cat"   id="scat${i}">${cat.categoryName.toUpperCase()}</div>
        <div class="s-premio" id="sp${i}">RECONOCIMIENTO EXTRAORDINARIO · MANIJA AWARDS 2026</div>
      </div>`;
    content.appendChild(slide);
  });
}

// ── Timeline math ──
function totalFrames() {
  const hasSpec = specialCategories.length > 0;
  return INTRO_F
    + categories.length * DIP_F
    + (hasSpec ? SPEC_TRANS_F + specialCategories.length * SPEC_F : 0)
    + OUTRO_F;
}

function getPhase(f) {
  if (f < INTRO_F) return { phase:'intro', local: f };
  f -= INTRO_F;
  for (let i=0; i<categories.length; i++) {
    if (f < DIP_F) return { phase:'dip', idx:i, local:f };
    f -= DIP_F;
  }
  if (specialCategories.length > 0) {
    if (f < SPEC_TRANS_F) return { phase:'spectrans', local:f };
    f -= SPEC_TRANS_F;
    for (let i=0; i<specialCategories.length; i++) {
      if (f < SPEC_F) return { phase:'spec', idx:i, local:f };
      f -= SPEC_F;
    }
  }
  return { phase:'outro', local: f };
}

// ── Set element opacity ──
function op(id,v) {
  const el=document.getElementById(id);
  if(el) el.style.opacity=v;
}
function tr(id,v) {
  const el=document.getElementById(id);
  if(el) el.style.transform=v;
}

// ── Neon glow ring on card ──
function cardGlow(id, intensity) {
  const el = document.getElementById(id);
  if (!el) return;
  const g = Math.round(intensity * 255);
  el.style.boxShadow = intensity > 0.01
    ? `0 0 ${40*intensity}px rgba(255,46,219,${0.6*intensity}),
       0 0 ${80*intensity}px rgba(200,0,255,${0.3*intensity}),
       0 0 ${20*intensity}px rgba(255,46,219,${0.8*intensity})`
    : 'none';
}
function cardGlowGold(id, intensity) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.boxShadow = intensity > 0.01
    ? `0 0 ${50*intensity}px rgba(255,215,0,${0.7*intensity}),
       0 0 ${100*intensity}px rgba(255,165,0,${0.3*intensity}),
       0 0 ${25*intensity}px rgba(255,215,0,${0.9*intensity})`
    : 'none';
}

// ── Flash ──
function doFlash(intensity) {
  flash.style.opacity = intensity;
  flash.style.background = '#fff';
}
function doFlashPink(intensity) {
  flash.style.opacity = intensity;
  flash.style.background = 'linear-gradient(135deg,#ff2edb,#cc00ff)';
}
function doFlashGold(intensity) {
  flash.style.opacity = intensity;
  flash.style.background = 'linear-gradient(135deg,#FFD700,#FF8C00)';
}

// ── Hide all slides ──
function hideAll() {
  intro.style.opacity      = 0;
  specTrans.style.opacity  = 0;
  outro.style.opacity      = 0;
  flash.style.opacity      = 0;
  for(let i=0;i<categories.length;i++){
    const s=document.getElementById(`ds${i}`);
    if(s) s.style.opacity=0;
  }
  for(let i=0;i<specialCategories.length;i++){
    const s=document.getElementById(`ss${i}`);
    if(s) s.style.opacity=0;
  }
}

// ── Render one frame ──
function render(f) {
  drawBg(f);
  hideAll();

  const { phase, idx, local: lf } = getPhase(f);
  const total = totalFrames();
  const dipTotal = categories.length + specialCategories.length;

  // HUD
  topLabel.style.opacity = (phase==='intro'||phase==='outro') ? 0 : 0.6;

  // ── INTRO ──
  if (phase === 'intro') {
    intro.style.opacity = 1;
    const m = document.getElementById('intro-manija');
    const a = document.getElementById('intro-awards');
    const y = document.getElementById('intro-year');
    const s = document.getElementById('intro-sub');

    // MANIJA slams in
    const mi = easeIn(lf, 8, 18);
    m.style.opacity   = mi;
    m.style.transform = `translateY(${(1-mi)*-80}px) scale(${0.6+mi*0.4})`;

    // AWARDS rises
    const ai = easeIn(lf, 22, 18);
    a.style.opacity   = ai;
    a.style.transform = `translateY(${(1-ai)*80}px) scale(${0.6+ai*0.4})`;

    y.style.opacity = fadeIn(lf, 42, 12);
    s.style.opacity = fadeIn(lf, 55, 14);

    // exit fade
    if (lf > 75) {
      const ex = fadeOut(lf, 75, 20);
      intro.style.opacity = ex;
      doFlashPink(1 - ex);
    }
    counter.textContent = '';
    return;
  }

  // ── REGULAR DIPLOMA ──
  if (phase === 'dip') {
    const slide = document.getElementById(`ds${idx}`);
    const card  = document.getElementById(`dc${idx}`);
    const dname = document.getElementById(`dn${idx}`);
    const dcat  = document.getElementById(`dcat${idx}`);
    const dvot  = document.getElementById(`dv${idx}`);
    if (!slide || !card) return;

    // Slide in: 0-35f
    const enterT = clamp(lf/35, 0, 1);
    const entered = ease(enterT);
    slide.style.opacity = entered > 0.01 ? 1 : 0;
    card.style.transform = `scale(${0.82+entered*0.18}) translateY(${(1-entered)*70}px)`;
    cardGlow(`dc${idx}`, entered * 0.8 * (0.85 + Math.sin(lf*0.12)*0.15));

    // Flash burst on entry
    doFlash(lf < 8 ? (1-lf/8)*0.8 : 0);

    // Winner name reveal: 35-65f (glitch typewriter effect)
    const nameT = fadeIn(lf, 35, 22);
    dname.style.opacity = nameT;
    // Clip width for typewriter
    const nameEl = dname;
    const clipPct = Math.round(nameT * 100);
    nameEl.style.clipPath = `inset(0 ${100-clipPct}% 0 0)`;

    // Category badge: 58-80f
    const catT = easeIn(lf, 58, 22);
    dcat.style.opacity   = catT;
    dcat.style.transform = `translateX(-50%) translateY(-50%) scale(${0.7+catT*0.3})`;

    // Votes: 80-100f
    const votT = fadeIn(lf, 80, 20);
    dvot.style.opacity = votT;

    // Glow pulse while on screen
    if (lf > 35) {
      const pulse = 0.7 + Math.sin(lf*0.18)*0.3;
      cardGlow(`dc${idx}`, pulse);
    }

    // Counter HUD
    counter.textContent = `${idx+1} / ${dipTotal}`;
    topLabel.style.opacity = fadeIn(lf, 40, 20) * 0.6;

    // Exit: last 25 frames
    if (lf > DIP_F - 30) {
      const ex = fadeOut(lf, DIP_F-30, 20);
      slide.style.opacity = ex;
      doFlashPink(1-ex);
    }
    return;
  }

  // ── SPECIAL TRANSITION ──
  if (phase === 'spectrans') {
    specTrans.style.opacity = 1;
    const el1 = specTrans.querySelector('h2');
    const el2 = specTrans.querySelector('p');

    const si = easeIn(lf, 5, 20);
    el1.style.opacity   = si;
    el1.style.transform = `scale(${0.7+si*0.3}) translateY(${(1-si)*-40}px)`;
    el2.style.opacity   = fadeIn(lf, 28, 16);

    // Gold flashes
    doFlashGold(lf < 6 ? (1-lf/6)*0.9 : 0);

    if (lf > SPEC_TRANS_F - 25) {
      const ex = fadeOut(lf, SPEC_TRANS_F-25, 20);
      specTrans.style.opacity = ex;
      doFlashGold(1-ex);
    }
    counter.textContent = '';
    return;
  }

  // ── SPECIAL DIPLOMA ──
  if (phase === 'spec') {
    const slide = document.getElementById(`ss${idx}`);
    const card  = document.getElementById(`sc${idx}`);
    const badge = document.getElementById(`sb${idx}`);
    const sname = document.getElementById(`sn${idx}`);
    const scat  = document.getElementById(`scat${idx}`);
    const sprm  = document.getElementById(`sp${idx}`);
    if (!slide || !card) return;

    const enterT = clamp(lf/40, 0, 1);
    const entered = ease(enterT);
    slide.style.opacity = entered > 0.01 ? 1 : 0;
    card.style.transform = `scale(${0.82+entered*0.18}) translateY(${(1-entered)*70}px)`;
    cardGlowGold(`sc${idx}`, entered * 0.9 * (0.85 + Math.sin(lf*0.1)*0.15));

    doFlashGold(lf < 8 ? (1-lf/8)*0.8 : 0);

    badge.style.opacity = fadeIn(lf, 30, 18);

    const nameT = fadeIn(lf, 42, 24);
    sname.style.opacity  = nameT;
    sname.style.clipPath = `inset(0 ${100-Math.round(nameT*100)}% 0 0)`;

    const catT = easeIn(lf, 68, 22);
    scat.style.opacity   = catT;
    scat.style.transform = `translateX(-50%) translateY(-50%) scale(${0.7+catT*0.3})`;

    sprm.style.opacity = fadeIn(lf, 92, 20);

    // Continuous gold pulse
    if (lf > 40) {
      const pulse = 0.75 + Math.sin(lf*0.14)*0.25;
      cardGlowGold(`sc${idx}`, pulse);
    }

    const dipSpecIdx = categories.length + idx + 1;
    counter.textContent = `${dipSpecIdx} / ${dipTotal}`;
    topLabel.style.opacity = fadeIn(lf, 50, 20) * 0.6;

    if (lf > SPEC_F - 30) {
      const ex = fadeOut(lf, SPEC_F-30, 22);
      slide.style.opacity = ex;
      doFlashGold(1-ex);
    }
    return;
  }

  // ── OUTRO ──
  if (phase === 'outro') {
    outro.style.opacity = 1;
    const h1 = outro.querySelector('h1');
    const p  = outro.querySelector('p');
    const cl = outro.querySelector('.club');

    const si = easeIn(lf, 4, 24);
    h1.style.opacity   = si;
    h1.style.transform = `scale(${0.7+si*0.3})`;
    p.style.opacity    = fadeIn(lf, 30, 18);
    cl.style.opacity   = fadeIn(lf, 48, 18);

    doFlash(lf < 6 ? (1-lf/6)*0.9 : 0);

    if (lf > OUTRO_F - 20) {
      outro.style.opacity = fadeOut(lf, OUTRO_F-20, 18);
    }
    counter.textContent = '';
    return;
  }
}

// ── Animation loop ──
let lastTime = 0;
// Mobile capped a 20fps para ahorrar batería y CPU
const FRAME_MS = 1000 / (isMobile ? 20 : FPS);

function loop(ts) {
  rafId = requestAnimationFrame(loop);
  if (paused) return;
  if (ts - lastTime < FRAME_MS - 2) return;
  lastTime = ts;

  const total = totalFrames();
  render(frame);
  frame++;
  if (frame >= total) frame = 0;
}

// ── postMessage ──
window.addEventListener('message', e => {
  const msg = e.data;
  if (!msg) return;

  if (msg === 'play')    { paused = false; return; }
  if (msg === 'pause')   { paused = true;  return; }
  if (msg === 'restart') { frame = 0; paused = false; return; }

  if (msg.type === 'data') {
    if (Array.isArray(msg.categories) && msg.categories.length)
      categories = msg.categories;
    if (Array.isArray(msg.specialCategories))
      specialCategories = msg.specialCategories;

    // Rebuild slides
    document.querySelectorAll('.dslide,.sslide').forEach(el => el.remove());
    built = false;
    buildSlides();
    frame = 0;
  }
});

// ── Start ──
buildSlides();
requestAnimationFrame(loop);
</script>
