<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Manija Awards 2026 – Diplomas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Arial Black', Arial, sans-serif;
    }
    #stage {
      width: 1920px; height: 1080px;
      transform-origin: top left;
      position: relative;
      background: #000;
    }
    /* ---- Diploma card ---- */
    .diploma {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: none;
    }
    .diploma-card {
      position: relative;
      width: 1300px;
      height: 920px;
      border-radius: 12px;
      overflow: hidden;
    }
    .diploma-bg {
      position: absolute;
      inset: 0;
      background-image: url('/Font.jpeg');
      background-size: cover;
      background-position: center;
    }
    /* Dark overlay so text reads better */
    .diploma-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.10) 40%,
        rgba(0,0,0,0.30) 70%,
        rgba(0,0,0,0.20) 100%
      );
    }
    /* Dynamic text fields (positions match Font.jpeg layout) */
    .dip-otorga {
      position: absolute;
      top: 47%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      letter-spacing: 6px;
      color: #aaa;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .dip-winner {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 14px;
      color: #ffffff;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
      text-shadow:
        0 0 30px rgba(255,255,255,0.9),
        0 0 60px rgba(255,255,255,0.4);
      opacity: 0;
    }
    .dip-reconocido {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      letter-spacing: 4px;
      color: #999;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .dip-category {
      position: absolute;
      top: 66.5%;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #ff2edb, #9b00ff);
      border-radius: 40px;
      padding: 12px 48px;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #fff;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 0 0 40px rgba(255,46,219,0.7);
      opacity: 0;
    }
    .dip-description {
      position: absolute;
      top: 77%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: #ccc;
      text-align: center;
      letter-spacing: 2px;
      max-width: 800px;
      line-height: 1.5;
      opacity: 0;
    }
    .dip-votes {
      position: absolute;
      top: 86%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 26px;
      font-weight: 700;
      color: #ff2edb;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,46,219,0.8);
      opacity: 0;
    }
    /* Laser scanline */
    #scanline {
      position: absolute;
      left: 0; width: 1920px; height: 4px;
      background: linear-gradient(90deg, transparent, #ff2edb, #00ffff, transparent);
      box-shadow: 0 0 20px #ff2edb;
      opacity: 0.8;
      top: 0;
      pointer-events: none;
    }
    /* Category counter */
    #counter {
      position: absolute;
      bottom: 30px; right: 60px;
      font-size: 28px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 4px;
    }
    /* Intro screen */
    #intro {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }
    #intro h1 {
      font-size: 90px;
      font-weight: 900;
      background: linear-gradient(90deg, #ff2edb, #00ffff, #ffff00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 10px;
      margin-bottom: 20px;
    }
    #intro p { font-size: 36px; color: #fff; letter-spacing: 6px; }
    /* Particles */
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      pointer-events: none;
    }
    /* Outro */
    #outro {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }
    #outro h2 { font-size: 72px; font-weight: 900; color: #ff2edb; letter-spacing: 8px; text-shadow: 0 0 40px #ff2edb; }
    #outro p { font-size: 36px; color: #00ffff; margin-top: 20px; letter-spacing: 4px; }
  </style>
</head>
<body>
<div id="stage">
  <div id="scanline"></div>

  <!-- Intro -->
  <div id="intro">
    <h1>🏆 MANIJA AWARDS 2026</h1>
    <p>REVELACIÓN DE GANADORES</p>
  </div>

  <!-- Diploma template (cloned per category via JS) -->
  <div id="diploma-container"></div>

  <!-- Category counter -->
  <div id="counter"></div>

  <!-- Outro -->
  <div id="outro">
    <h2>🎉 FELICITACIONES A TODOS 🎉</h2>
    <p>LA NOCHE ES NUESTRA ⚡</p>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────
const FPS             = 30;
const INTRO_FRAMES    = 60;   // 2s  intro
const PER_DIP_FRAMES  = 210;  // 7s  per diploma
const OUTRO_FRAMES    = 90;   // 3s  outro

// Default placeholder until real data arrives
let categories = [
  { categoryName: 'Categoría 1', winnerName: 'Por Definir', winnerDescription: 'Esperando datos...', votes: 0 },
  { categoryName: 'Categoría 2', winnerName: 'Por Definir', winnerDescription: 'Esperando datos...', votes: 0 },
];
let dataReady = false;

// ─── Stage scaling ────────────────────────────────────────
function scaleStage() {
  const s = document.getElementById('stage');
  const sx = window.innerWidth  / 1920;
  const sy = window.innerHeight / 1080;
  const sc = Math.min(sx, sy);
  s.style.transform = `scale(${sc})`;
  s.style.marginLeft = ((window.innerWidth  - 1920 * sc) / 2) + 'px';
  s.style.marginTop  = ((window.innerHeight - 1080 * sc) / 2) + 'px';
}
window.addEventListener('resize', scaleStage);
scaleStage();

// ─── Playback state ───────────────────────────────────────
let frame = 0;
let playing = false;
let rafId = null;
let lastTs = null;
let accum = 0;
const MS_PER_FRAME = 1000 / FPS;

// ─── DOM helpers ─────────────────────────────────────────
function buildDiplomas() {
  const container = document.getElementById('diploma-container');
  container.innerHTML = '';
  categories.forEach((cat, i) => {
    const div = document.createElement('div');
    div.className = 'diploma';
    div.id = `dip-${i}`;
    div.innerHTML = `
      <div class="diploma-card">
        <div class="diploma-bg"></div>
        <div class="diploma-overlay"></div>
        <div class="dip-otorga">ESTE DIPLOMA SE OTORGA A:</div>
        <div class="dip-winner" id="dw-${i}">${cat.winnerName}</div>
        <div class="dip-reconocido">POR HABER SIDO RECONOCIDO EN LA CATEGORÍA:</div>
        <div class="dip-category" id="dc-${i}">${cat.categoryName.toUpperCase()}</div>
        <div class="dip-description" id="dd-${i}">${cat.winnerDescription || ''}</div>
        <div class="dip-votes" id="dv-${i}">${cat.votes > 0 ? '⚡ ' + cat.votes + ' VOTOS ⚡' : ''}</div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ─── Frame renderer ───────────────────────────────────────
function totalFrames() {
  return INTRO_FRAMES + categories.length * PER_DIP_FRAMES + OUTRO_FRAMES;
}

function renderFrame(f) {
  const intro  = document.getElementById('intro');
  const outro  = document.getElementById('outro');
  const scan   = document.getElementById('scanline');
  const counter= document.getElementById('counter');

  // Scanline animation
  scan.style.top = ((f * 5) % 1080) + 'px';

  // ── Intro phase ──────────────────────────────────────────
  if (f < INTRO_FRAMES) {
    intro.style.opacity = f < 30 ? f / 30 : (f > 50 ? (60 - f) / 10 : 1);
    outro.style.opacity = '0';
    categories.forEach((_, i) => {
      const d = document.getElementById(`dip-${i}`);
      if (d) d.style.opacity = '0';
    });
    counter.textContent = '';
    return;
  }

  intro.style.opacity = '0';

  // ── Diploma phases ───────────────────────────────────────
  const afterIntro = f - INTRO_FRAMES;
  const dipIdx     = Math.floor(afterIntro / PER_DIP_FRAMES);
  const dipFrame   = afterIntro % PER_DIP_FRAMES;

  if (dipIdx < categories.length) {
    outro.style.opacity = '0';
    counter.textContent = (dipIdx + 1) + ' / ' + categories.length;

    categories.forEach((_, i) => {
      const d = document.getElementById(`dip-${i}`);
      if (!d) return;
      if (i !== dipIdx) { d.style.opacity = '0'; return; }

      // Fade in card
      const cardOpacity = dipFrame < 20 ? dipFrame / 20 : 1;
      d.style.opacity = cardOpacity;

      // Winner name appears at frame 25 with glow pulse
      const dw = document.getElementById(`dw-${i}`);
      if (dw) {
        dw.style.opacity = dipFrame > 24 ? Math.min((dipFrame - 24) / 15, 1) : 0;
        const pulse = Math.sin(dipFrame * 0.15) * 15;
        dw.style.textShadow = `0 0 ${30 + pulse}px rgba(255,255,255,0.9), 0 0 ${60 + pulse}px rgba(255,255,255,0.4)`;
      }
      // Category badge slides in at frame 50
      const dc = document.getElementById(`dc-${i}`);
      if (dc) dc.style.opacity = dipFrame > 49 ? Math.min((dipFrame - 49) / 15, 1) : 0;
      // Description at frame 70
      const dd = document.getElementById(`dd-${i}`);
      if (dd) dd.style.opacity = dipFrame > 69 ? Math.min((dipFrame - 69) / 15, 1) : 0;
      // Votes at frame 90
      const dv = document.getElementById(`dv-${i}`);
      if (dv) {
        dv.style.opacity = dipFrame > 89 ? Math.min((dipFrame - 89) / 15, 1) : 0;
        const glow = Math.abs(Math.sin(dipFrame * 0.1)) * 30;
        dv.style.textShadow = `0 0 ${20 + glow}px rgba(255,46,219,0.9)`;
      }
      // Fade out near end
      if (dipFrame > PER_DIP_FRAMES - 20) {
        d.style.opacity = (PER_DIP_FRAMES - dipFrame) / 20;
      }
    });
    return;
  }

  // ── Outro phase ──────────────────────────────────────────
  categories.forEach((_, i) => {
    const d = document.getElementById(`dip-${i}`);
    if (d) d.style.opacity = '0';
  });
  counter.textContent = '';
  const outroFrame = afterIntro - categories.length * PER_DIP_FRAMES;
  outro.style.opacity = outroFrame < 30 ? outroFrame / 30 : 1;

  // Loop back
  if (f >= totalFrames() - 1) frame = 0;
}

// ─── RAF loop ─────────────────────────────────────────────
function loop(ts) {
  if (!lastTs) lastTs = ts;
  accum += ts - lastTs;
  lastTs = ts;
  while (accum >= MS_PER_FRAME) {
    accum -= MS_PER_FRAME;
    frame++;
    if (frame >= totalFrames()) frame = 0;
  }
  renderFrame(frame);
  if (playing) rafId = requestAnimationFrame(loop);
}

function play()    { if (playing) return; playing = true; lastTs = null; accum = 0; rafId = requestAnimationFrame(loop); }
function pause()   { playing = false; if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
function restart() { frame = 0; lastTs = null; accum = 0; if (!playing) renderFrame(0); }

// ─── postMessage API ──────────────────────────────────────
window.addEventListener('message', e => {
  const msg = e.data;
  if (!msg) return;
  if (msg === 'play')    { play(); return; }
  if (msg === 'pause')   { pause(); return; }
  if (msg === 'restart') { restart(); play(); return; }
  // Real data: { type: 'data', categories: [...] }
  if (msg.type === 'data' && Array.isArray(msg.categories)) {
    categories = msg.categories;
    dataReady = true;
    buildDiplomas();
    frame = 0;
    renderFrame(0);
    if (!playing) play();
  }
});

// ─── Boot ─────────────────────────────────────────────────
buildDiplomas();
renderFrame(0);
play();
</script>
</body>
</html>
