<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Manija Awards 2026 – Logo Reveal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#000; overflow:hidden; }
  #stage {
    width:1920px; height:1080px;
    transform-origin:top left;
    position:relative;
    font-family:'Arial Black',Arial,sans-serif;
  }
  @keyframes scanH { from{left:-100%} to{left:200%} }
</style>
</head>
<body>
<div id="stage"></div>
<script>
// ─── Easing helpers ──────────────────────────────────────────────────────────
function easeInOut(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t }
function ease(f,s,e,a=0,b=1){
  if(f<=s) return a; if(f>=e) return b;
  return a + easeInOut((f-s)/(e-s))*(b-a);
}
function fadeIn(f,s,len=20){ return ease(f,s,s+len) }
function slideUp(f,s,dist=40,len=25){ const p=ease(f,s,s+len); return `translateY(${dist*(1-p)}px)` }

// ─── Scale & position stage ───────────────────────────────────────────────────
function scaleStage(){
  const el=document.getElementById('stage');
  const sc=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  el.style.transform=`scale(${sc})`;
  el.style.marginLeft=((window.innerWidth-1920*sc)/2)+'px';
  el.style.marginTop=((window.innerHeight-1080*sc)/2)+'px';
}
window.addEventListener('resize',scaleStage); scaleStage();

// ─── Playback ────────────────────────────────────────────────────────────────
const FPS=30, TOTAL=2100; // 70s
let frame=0,playing=false,rafId=null,lastTs=null,accum=0;

// ─── SVG Logo builder ────────────────────────────────────────────────────────
// Logo: incomplete circle (270° arc, gap at top-right) + 3 vertical bars + 1 horizontal bar
function buildLogo({
  circleProgress=1, bar1P=1, bar2P=1, bar3P=1, hbarP=1,
  hlCircle=false, hlBars=false, hlHbar=false, hlAll=false,
  scale=1, glowPulse=0, cx=200, cy=200, size=380
}={}){
  const r=155, C=2*Math.PI*r;
  const arcLen=C*(270/360), gapLen=C-arcLen;
  const dOff= arcLen*(1-Math.min(circleProgress,1));

  const cGlow = hlCircle||hlAll ? `0 0 ${20+glowPulse*15}px #ff2edb,0 0 40px #c000ff` : '0 0 8px #9b00ff';
  const bGlow = hlBars||hlAll   ? `0 0 ${20+glowPulse*15}px #ff2edb,0 0 30px #ff6600` : '0 0 6px #9b00ff80';
  const hGlow = hlHbar||hlAll   ? `0 0 ${20+glowPulse*15}px #ff2edb,0 0 30px #00ffff`  : '0 0 6px #9b00ff80';

  const cStroke= hlCircle||hlAll ? '#ff2edb' : 'url(#logoGrad)';
  const bFill  = hlBars||hlAll   ? '#ff2edb'  : 'url(#logoGrad)';
  const hFill  = hlHbar||hlAll   ? '#00ffff'  : 'url(#logoGrad)';

  // Bar dimensions (within 400×400 viewbox)
  const bw=24, bh=220, bx1=120, bx2=180, bx3=240, by=90;
  const hw=220, hh=24, hx=90, hy=185;
  const cx0=200, cy0=200;

  // Scale transform from center
  const ts=`translate(${cx0*(1-scale)},${cy0*(1-scale)}) scale(${scale})`;

  return `<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="width:${size}px;height:${size}px;overflow:visible">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c000ff"/>
        <stop offset="50%" stop-color="#ff2edb"/>
        <stop offset="100%" stop-color="#ff6600"/>
      </linearGradient>
      <filter id="gCircle"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="gBar"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g transform="${ts}">
      <!-- Outer glow ring -->
      <circle cx="${cx0}" cy="${cy0}" r="${r+18}" fill="none" stroke="#c000ff" stroke-width="2" opacity="0.2"
        stroke-dasharray="${arcLen} ${gapLen}" stroke-dashoffset="${dOff}"/>
      <!-- Main circle -->
      <circle cx="${cx0}" cy="${cy0}" r="${r}" fill="none"
        stroke="${cStroke}" stroke-width="14"
        stroke-dasharray="${arcLen} ${gapLen}"
        stroke-dashoffset="${dOff}"
        stroke-linecap="round"
        style="filter:drop-shadow(${cGlow})"/>
      <!-- Vertical bar 1 -->
      <rect x="${bx1}" y="${by + bh*(1-bar1P)}" width="${bw}" height="${bh*bar1P}"
        rx="4" fill="${bFill}" style="filter:drop-shadow(${bGlow})"/>
      <!-- Vertical bar 2 -->
      <rect x="${bx2}" y="${by + bh*(1-bar2P)}" width="${bw}" height="${bh*bar2P}"
        rx="4" fill="${bFill}" style="filter:drop-shadow(${bGlow})"/>
      <!-- Vertical bar 3 -->
      <rect x="${bx3}" y="${by + bh*(1-bar3P)}" width="${bw}" height="${bh*bar3P}"
        rx="4" fill="${bFill}" style="filter:drop-shadow(${bGlow})"/>
      <!-- Horizontal bar -->
      <rect x="${hx}" y="${hy}" width="${hw*hbarP}" height="${hh}"
        rx="4" fill="${hFill}" style="filter:drop-shadow(${hGlow})"/>
    </g>
  </svg>`;
}

// ─── Bullet builder ──────────────────────────────────────────────────────────
function bullet(text,f,start,color='#ccc'){
  const op=fadeIn(f,start); const tr=slideUp(f,start);
  return `<div style="opacity:${op};transform:${tr};display:flex;align-items:flex-start;gap:12px;margin-bottom:14px">
    <span style="color:${color};font-size:22px;flex-shrink:0;margin-top:2px">•</span>
    <span style="font-size:22px;color:${color};line-height:1.5">${text}</span>
  </div>`;
}
function arrow(text,f,start){
  const op=fadeIn(f,start); const tr=slideUp(f,start);
  return `<div style="opacity:${op};transform:${tr};margin-top:20px;padding:18px 24px;
    background:rgba(255,46,219,0.08);border-left:3px solid #ff2edb;border-radius:0 10px 10px 0">
    <span style="font-size:21px;color:#ff9be8;line-height:1.5">→ ${text}</span>
  </div>`;
}

// ─── BG ──────────────────────────────────────────────────────────────────────
function bg(f){
  const hue=(f*0.15)%360;
  return `radial-gradient(ellipse at ${45+Math.sin(f*.02)*15}% ${40+Math.cos(f*.015)*12}%,
    hsl(${hue},60%,5%) 0%, #05020e 60%, #000 100%)`;
}
function laser(f){
  const l1=(f*3.5)%1920, l2=(f*2.2)%1920, l3=(f*4)%1080;
  return `<div style="position:absolute;top:0;left:${l1}px;width:2px;height:1080px;
      background:linear-gradient(to bottom,transparent,#c000ff40,transparent);pointer-events:none"></div>
    <div style="position:absolute;top:0;right:${l2}px;width:1px;height:1080px;
      background:linear-gradient(to bottom,transparent,#ff660030,transparent);pointer-events:none"></div>
    <div style="position:absolute;top:${l3}px;left:0;width:1920px;height:1px;
      background:linear-gradient(to right,transparent,#ff2edb20,transparent);pointer-events:none"></div>`;
}

// ─── PHASES ──────────────────────────────────────────────────────────────────
// Phase 0: INTRO          0-90      (3s)
// Phase 1: LOGO BUILD     90-360    (9s)
// Phase 2: EL CÍRCULO     360-630   (9s)
// Phase 3: LAS LÍNEAS     630-900   (9s)
// Phase 4: LÍNEA HORIZ    900-1170  (9s)
// Phase 5: ESTÉT TECHNO   1170-1440 (9s)
// Phase 6: CLIMAX         1440-1710 (9s)
// Phase 7: 4 ÍCONOS       1710-1980 (9s)
// Phase 8: OUTRO          1980-2100 (4s)

function renderFrame(f){
  const stage=document.getElementById('stage');
  if(!stage) return;
  const pulse=Math.sin(f*.12)*.5+.5; // 0→1→0 oscillation

  // ── PHASE 0: INTRO ───────────────────────────────────────────────────────
  if(f<90){
    const op1=fadeIn(f,0,25), op2=fadeIn(f,20,25), op3=fadeIn(f,40,25), op4=fadeIn(f,60,25);
    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center">
      ${laser(f)}
      <div style="text-align:center">
        <div style="opacity:${op1};font-size:22px;letter-spacing:12px;color:#ff2edb;margin-bottom:30px;transform:${slideUp(f,0,30,20)}">NUESTRO SÍMBOLO</div>
        <div style="opacity:${op2};font-size:92px;font-weight:900;color:#fff;letter-spacing:6px;line-height:1;transform:${slideUp(f,20,40)}">MÁS QUE UN LOGO,</div>
        <div style="opacity:${op3};font-size:92px;font-weight:900;background:linear-gradient(90deg,#c000ff,#ff2edb);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:6px;line-height:1;transform:${slideUp(f,40,25)}">SOMOS UN CICLO</div>
        <div style="opacity:${op4};font-size:92px;font-weight:900;background:linear-gradient(90deg,#ff2edb,#ff6600);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:6px;line-height:1;transform:${slideUp(f,60,25)}">SIN FIN.</div>
      </div>
    </div>`;
    return;
  }

  // ── PHASE 1: LOGO BUILD ──────────────────────────────────────────────────
  if(f<360){
    const circP = ease(f,90,175);
    const b1P   = ease(f,155,210);
    const b2P   = ease(f,170,225);
    const b3P   = ease(f,185,240);
    const hP    = ease(f,200,255);
    const logoOp= fadeIn(f,90,20);
    const tagOp = fadeIn(f,230,20);
    const tagTr = slideUp(f,230,25);
    const logoScale = ease(f,90,130,.8,1);

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px">
      ${laser(f)}
      <div style="font-size:22px;letter-spacing:12px;color:#ff2edb;opacity:${fadeIn(f,90,15)}">CONSTRUYENDO EL SÍMBOLO</div>
      <div style="opacity:${logoOp}">
        ${buildLogo({circleProgress:circP,bar1P:b1P,bar2P:b2P,bar3P:b3P,hbarP:hP,hlAll:false,scale:logoScale,glowPulse:pulse,size:480})}
      </div>
      <div style="opacity:${tagOp};transform:${tagTr};text-align:center">
        <div style="font-size:34px;letter-spacing:10px;color:#fff">SOMOS UN CICLO SIN FIN</div>
        <div style="width:400px;height:2px;background:linear-gradient(90deg,transparent,#ff2edb,transparent);margin:14px auto 0"></div>
      </div>
    </div>`;
    return;
  }

  // ─── Shared logo state for phases 2-5 (fully built) ──────────────────────
  const LOGO_FULL={circleProgress:1,bar1P:1,bar2P:1,bar3P:1,hbarP:1,scale:1,glowPulse:pulse,size:340};

  // ── PHASE 2: EL CÍRCULO INCOMPLETO ───────────────────────────────────────
  if(f<630){
    const pf=f-360; // 0-270
    const logoGlow={...LOGO_FULL, hlCircle:true, glowPulse:pulse};
    const pulseScale = 1 + Math.sin(pf*.15)*.03;

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;align-items:center">
      ${laser(f)}

      <!-- LEFT: Logo with circle highlighted -->
      <div style="width:780px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:1080px;gap:30px;flex-shrink:0">
        <div style="transform:scale(${pulseScale})">${buildLogo({...logoGlow})}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:14px;opacity:${fadeIn(f,380,20)}">
          <!-- Circle icon small -->
          <svg width="50" height="50" viewBox="0 0 50 50">
            <circle cx="25" cy="25" r="20" fill="none" stroke="#ff2edb" stroke-width="3"
              stroke-dasharray="105 30" stroke-linecap="round"
              style="filter:drop-shadow(0 0 8px #ff2edb)"/>
          </svg>
          <span style="font-size:18px;color:#ff2edb;letter-spacing:4px;font-weight:700">EL CÍRCULO INCOMPLETO</span>
        </div>
      </div>

      <!-- Divider -->
      <div style="width:2px;height:700px;background:linear-gradient(to bottom,transparent,#ff2edb60,transparent);flex-shrink:0"></div>

      <!-- RIGHT: Content -->
      <div style="flex:1;padding:60px 80px 60px 60px;display:flex;flex-direction:column;justify-content:center">
        <div style="opacity:${fadeIn(f,360,20)};transform:${slideUp(f,360,30)}">
          <div style="font-size:15px;letter-spacing:8px;color:#ff2edb;margin-bottom:10px">01 / ELEMENTO</div>
          <h2 style="font-size:60px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1.1;margin-bottom:40px;text-shadow:0 0 30px rgba(192,0,255,.5)">EL CÍRCULO<br>INCOMPLETO</h2>
        </div>
        ${bullet('Representa <strong>la noche.</strong>',f,385,'#e0e0ff')}
        ${bullet('El <strong>loop del techno.</strong>',f,408,'#e0e0ff')}
        ${bullet('El club: <strong>nuestro espacio</strong>, cerrado para los que pertenecen.',f,431,'#e0e0ff')}
        ${arrow('Está abierto porque esto nunca termina.<br>Siempre hay otro carrete, otro after, otra historia.',f,470)}
      </div>
    </div>`;
    return;
  }

  // ── PHASE 3: LAS LÍNEAS VERTICALES ────────────────────────────────────────
  if(f<900){
    const pf=f-630;
    const barPulseX = 1+Math.sin(pf*.2)*.025;

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;align-items:center">
      ${laser(f)}
      <!-- LEFT -->
      <div style="width:780px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:1080px;gap:30px;flex-shrink:0">
        <div style="transform:scaleX(${barPulseX})">${buildLogo({...LOGO_FULL,hlBars:true})}</div>
        <div style="display:flex;align-items:center;gap:14px;opacity:${fadeIn(f,640,20)}">
          <!-- Three bars icon -->
          <svg width="50" height="50" viewBox="0 0 50 50">
            <rect x="8"  y="10" width="8" height="30" rx="2" fill="#ff2edb" style="filter:drop-shadow(0 0 6px #ff2edb)"/>
            <rect x="21" y="10" width="8" height="30" rx="2" fill="#ff2edb" style="filter:drop-shadow(0 0 6px #ff2edb)"/>
            <rect x="34" y="10" width="8" height="30" rx="2" fill="#ff2edb" style="filter:drop-shadow(0 0 6px #ff2edb)"/>
          </svg>
          <span style="font-size:18px;color:#ff2edb;letter-spacing:4px;font-weight:700">LAS LÍNEAS VERTICALES</span>
        </div>
      </div>
      <div style="width:2px;height:700px;background:linear-gradient(to bottom,transparent,#ff660060,transparent);flex-shrink:0"></div>
      <!-- RIGHT -->
      <div style="flex:1;padding:60px 80px 60px 60px;display:flex;flex-direction:column;justify-content:center">
        <div style="opacity:${fadeIn(f,630,20)};transform:${slideUp(f,630,30)}">
          <div style="font-size:15px;letter-spacing:8px;color:#ff6600;margin-bottom:10px">02 / ELEMENTO</div>
          <h2 style="font-size:60px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1.1;margin-bottom:40px;text-shadow:0 0 30px rgba(255,102,0,.5)">LAS LÍNEAS<br>VERTICALES</h2>
        </div>
        ${bullet('<strong>Somos el grupo.</strong>',f,650,'#ffe0cc')}
        ${bullet('Tres líneas, <strong>tres individuos.</strong>',f,673,'#ffe0cc')}
        ${bullet('Distintos, pero <strong>alineados bajo la misma dirección.</strong>',f,696,'#ffe0cc')}
        ${arrow('No somos clones.<br>Somos personas con una misma vibra.',f,735)}
      </div>
    </div>`;
    return;
  }

  // ── PHASE 4: LA LÍNEA HORIZONTAL ──────────────────────────────────────────
  if(f<1170){
    const pf=f-900;
    const hPulseY=1+Math.sin(pf*.2)*.02;

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;align-items:center">
      ${laser(f)}
      <!-- LEFT -->
      <div style="width:780px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:1080px;gap:30px;flex-shrink:0">
        <div style="transform:scaleY(${hPulseY})">${buildLogo({...LOGO_FULL,hlHbar:true})}</div>
        <div style="display:flex;align-items:center;gap:14px;opacity:${fadeIn(f,910,20)}">
          <!-- Horizontal line icon -->
          <svg width="60" height="30" viewBox="0 0 60 30">
            <rect x="4" y="13" width="52" height="4" rx="2" fill="#00ffff" style="filter:drop-shadow(0 0 8px #00ffff)"/>
          </svg>
          <span style="font-size:18px;color:#00ffff;letter-spacing:4px;font-weight:700">LA LÍNEA HORIZONTAL</span>
        </div>
      </div>
      <div style="width:2px;height:700px;background:linear-gradient(to bottom,transparent,#00ffff60,transparent);flex-shrink:0"></div>
      <!-- RIGHT -->
      <div style="flex:1;padding:60px 80px 60px 60px;display:flex;flex-direction:column;justify-content:center">
        <div style="opacity:${fadeIn(f,900,20)};transform:${slideUp(f,900,30)}">
          <div style="font-size:15px;letter-spacing:8px;color:#00ffff;margin-bottom:10px">03 / ELEMENTO</div>
          <h2 style="font-size:60px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1.1;margin-bottom:40px;text-shadow:0 0 30px rgba(0,255,255,.5)">LA LÍNEA<br>HORIZONTAL</h2>
        </div>
        ${bullet('Es la <strong>lealtad.</strong>',f,920,'#ccffff')}
        ${bullet('El <strong>código no hablado.</strong>',f,943,'#ccffff')}
        ${bullet('Lo que nos <strong>conecta dentro y fuera de la fiesta.</strong>',f,966,'#ccffff')}
        ${arrow('Sin esta línea, somos nada.<br>Con ella, somos <strong>hermandad.</strong>',f,1005)}
      </div>
    </div>`;
    return;
  }

  // ── PHASE 5: ESTÉTICA TECHNO ───────────────────────────────────────────────
  if(f<1440){
    const pf=f-1170;
    // Animated waveform
    const wavePoints = Array.from({length:30},(_,i)=>{
      const h=20+Math.abs(Math.sin((i*0.6)+(pf*0.12)))*55;
      return `<rect x="${i*22}" y="${50-h/2}" width="14" height="${h}" rx="3"
        fill="url(#wg)" style="filter:drop-shadow(0 0 6px #ff2edb)"/>`;
    }).join('');

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;align-items:center">
      ${laser(f)}
      <!-- LEFT -->
      <div style="width:780px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:1080px;gap:30px;flex-shrink:0">
        ${buildLogo({...LOGO_FULL,hlAll:true,glowPulse:pulse})}
        <div style="opacity:${fadeIn(f,1180,20)}">
          <svg width="660" height="100" viewBox="0 0 660 100" style="overflow:visible">
            <defs>
              <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ff2edb"/>
                <stop offset="100%" stop-color="#9b00ff"/>
              </linearGradient>
            </defs>
            ${wavePoints}
          </svg>
        </div>
      </div>
      <div style="width:2px;height:700px;background:linear-gradient(to bottom,transparent,#ff2edb60,transparent);flex-shrink:0"></div>
      <!-- RIGHT -->
      <div style="flex:1;padding:60px 80px 60px 60px;display:flex;flex-direction:column;justify-content:center">
        <div style="opacity:${fadeIn(f,1170,20)};transform:${slideUp(f,1170,30)}">
          <div style="font-size:15px;letter-spacing:8px;color:#ff2edb;margin-bottom:10px">04 / ELEMENTO</div>
          <h2 style="font-size:60px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1.1;margin-bottom:40px;text-shadow:0 0 30px rgba(255,46,219,.5)">ESTÉTICA<br>TECHNO</h2>
        </div>
        ${bullet('Inspirado en el mundo del <strong>sonido</strong>, las frecuencias y la energía.',f,1190,'#ffd6f5')}
        ${bullet('<strong>Minimalista</strong>, limpio, frío, preciso.',f,1213,'#ffd6f5')}
        ${bullet('No grita, <strong>hipnotiza.</strong>',f,1236,'#ffd6f5')}
        ${arrow('Un lenguaje visual <strong>hecho para la pista.</strong>',f,1275)}
      </div>
    </div>`;
    return;
  }

  // ── PHASE 6: CLIMAX ──────────────────────────────────────────────────────
  if(f<1710){
    const pf=f-1440;
    const logoScale=1+Math.sin(pf*.08)*.05;
    const boxOp=fadeIn(f,1440,25);
    const line1Op=fadeIn(f,1455,20);
    const line2Op=fadeIn(f,1480,25);
    const line2Tr=slideUp(f,1480,40);
    const line3Op=fadeIn(f,1530,20);
    const subOp=fadeIn(f,1560,20);

    const glowIntensity=20+pulse*40;

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:50px">
      ${laser(f)}
      <!-- Logo pulsing large -->
      <div style="transform:scale(${logoScale})">
        ${buildLogo({...LOGO_FULL,hlAll:true,glowPulse:pulse,size:400})}
      </div>
      <!-- Dark box -->
      <div style="opacity:${boxOp};width:1300px;background:rgba(10,5,25,.85);border:1px solid #ff2edb40;
        border-radius:20px;padding:48px 64px;text-align:center;
        box-shadow:0 0 80px rgba(192,0,255,.2),inset 0 0 60px rgba(0,0,0,.5)">
        <div style="opacity:${line1Op};font-size:20px;letter-spacing:10px;color:#aaa;margin-bottom:16px">ESTO ES MÁS QUE MÚSICA.</div>
        <div style="opacity:${line2Op};transform:${line2Tr};font-size:${72+pulse*8}px;font-weight:900;
          color:#fff;letter-spacing:8px;line-height:1;
          text-shadow:0 0 ${glowIntensity}px #ff2edb,0 0 ${glowIntensity*2}px #c000ff">
          ES UN CICLO SIN FIN.
        </div>
        <div style="opacity:${line3Op};height:2px;background:linear-gradient(90deg,transparent,#ff2edb,transparent);margin:28px 0"></div>
        <div style="opacity:${subOp};font-size:22px;letter-spacing:6px;color:#ddd">
          MISMA ENERGÍA.&nbsp;&nbsp;MISMA LEALTAD.&nbsp;&nbsp;MISMA FAMILIA.
        </div>
      </div>
    </div>`;
    return;
  }

  // ── PHASE 7: 4 ICONOS ────────────────────────────────────────────────────
  if(f<1980){
    const icons=[
      {
        f:1710, label:'CICLO\nINFINITO', color:'#ff2edb',
        svg:`<svg width="80" height="80" viewBox="0 0 80 80">
          <path d="M40 12 A28 28 0 1 1 14 44" fill="none" stroke="#ff2edb" stroke-width="5" stroke-linecap="round"
            style="filter:drop-shadow(0 0 8px #ff2edb)"/>
          <polygon points="12,34 14,44 22,38" fill="#ff2edb"/>
        </svg>`
      },
      {
        f:1760, label:'INDIVIDUOS\nALINEADOS', color:'#c000ff',
        svg:`<svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="20" cy="26" r="10" fill="#c000ff" style="filter:drop-shadow(0 0 6px #c000ff)"/>
          <circle cx="40" cy="26" r="10" fill="#c000ff" style="filter:drop-shadow(0 0 6px #c000ff)"/>
          <circle cx="60" cy="26" r="10" fill="#c000ff" style="filter:drop-shadow(0 0 6px #c000ff)"/>
          <path d="M5 65 Q20 46 35 55 Q40 58 45 55 Q60 46 75 65" fill="#c000ff40" stroke="#c000ff" stroke-width="2"/>
        </svg>`
      },
      {
        f:1810, label:'LEALTAD QUE\nNOS UNE', color:'#00ffff',
        svg:`<svg width="80" height="80" viewBox="0 0 80 80">
          <path d="M10 40 Q20 25 30 35 Q40 45 50 35 Q60 25 70 40" fill="none" stroke="#00ffff" stroke-width="5" stroke-linecap="round"
            style="filter:drop-shadow(0 0 8px #00ffff)"/>
          <rect x="25" y="50" width="14" height="20" rx="3" fill="#00ffff40" stroke="#00ffff" stroke-width="2"/>
          <rect x="41" y="50" width="14" height="20" rx="3" fill="#00ffff40" stroke="#00ffff" stroke-width="2"/>
        </svg>`
      },
      {
        f:1860, label:'ENERGÍA QUE\nNOS MUEVE', color:'#ff6600',
        svg:`<svg width="80" height="80" viewBox="0 0 80 80">
          ${[0,1,2,3,4].map(i=>`<rect x="${8+i*14}" y="${65-[20,40,55,35,48][i]}" width="10" height="${[20,40,55,35,48][i]}" rx="3"
            fill="#ff6600" style="filter:drop-shadow(0 0 6px #ff6600)"/>`).join('')}
        </svg>`
      },
    ];

    const iconCards=icons.map(ic=>{
      const op=fadeIn(f,ic.f,25);
      const tr=slideUp(f,ic.f,40);
      const lines=ic.label.split('\n');
      return `<div style="opacity:${op};transform:${tr};text-align:center;width:300px;
          padding:40px 30px;background:rgba(255,255,255,.04);
          border:1px solid ${ic.color}40;border-radius:20px;
          box-shadow:0 0 40px ${ic.color}20">
        <div style="margin-bottom:20px">${ic.svg}</div>
        ${lines.map(l=>`<div style="font-size:20px;font-weight:900;color:${ic.color};letter-spacing:4px;line-height:1.3">${l}</div>`).join('')}
      </div>`;
    }).join('');

    const titleOp=fadeIn(f,1710,20);
    const logoOp=fadeIn(f,1715,20);

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:60px">
      ${laser(f)}
      <div style="display:flex;align-items:center;gap:40px">
        <div style="opacity:${logoOp}">${buildLogo({...LOGO_FULL,hlAll:true,glowPulse:pulse,size:220})}</div>
        <div style="opacity:${titleOp};text-align:left">
          <div style="font-size:16px;letter-spacing:10px;color:#ff2edb;margin-bottom:8px">EL SÍMBOLO COMPLETO</div>
          <div style="font-size:54px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1">4 CONCEPTOS,</div>
          <div style="font-size:54px;font-weight:900;background:linear-gradient(90deg,#c000ff,#ff6600);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:4px">1 IDENTIDAD.</div>
        </div>
      </div>
      <div style="display:flex;gap:30px">${iconCards}</div>
    </div>`;
    return;
  }

  // ── PHASE 8: OUTRO ──────────────────────────────────────────────────────
  {
    const pf=f-1980;
    const allOp=fadeIn(f,1980,30);
    const logoScale=1+Math.sin(pf*.1)*.04;
    const footerOp=fadeIn(f,2020,25);

    stage.innerHTML=`
    <div style="width:1920px;height:1080px;background:${bg(f)};position:relative;overflow:hidden;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px">
      ${laser(f)}
      <div style="opacity:${allOp};transform:scale(${logoScale})">
        ${buildLogo({...LOGO_FULL,hlAll:true,glowPulse:pulse,size:360})}
      </div>
      <div style="opacity:${allOp};text-align:center">
        <div style="font-size:28px;letter-spacing:8px;color:#ff2edb;margin-bottom:10px">NUESTRO SÍMBOLO</div>
        <div style="font-size:70px;font-weight:900;color:#fff;letter-spacing:6px;
          text-shadow:0 0 ${30+pulse*30}px #ff2edb,0 0 60px #c000ff">
          SOMOS UN CICLO SIN FIN.
        </div>
      </div>
      <div style="opacity:${footerOp};display:flex;align-items:center;gap:30px">
        <div style="width:300px;height:1px;background:linear-gradient(90deg,transparent,#ff2edb)"></div>
        <div style="font-size:22px;letter-spacing:8px;color:#aaa;white-space:nowrap">MISMA NOCHE. MISMA VIBRA. SIEMPRE.</div>
        <div style="width:300px;height:1px;background:linear-gradient(90deg,#ff2edb,transparent)"></div>
      </div>
      <!-- Loop indicator -->
      ${pf>60?`<div style="position:absolute;bottom:30px;opacity:${ease(f,2040,2100,.0,1)};font-size:14px;color:#ffffff30;letter-spacing:4px">⟳ REPRODUCIENDO</div>`:''}
    </div>`;

    // Loop
    if(f>=TOTAL-1) frame=0;
  }
}

// ─── RAF loop ────────────────────────────────────────────────────────────────
function loop(ts){
  if(!lastTs) lastTs=ts;
  accum+=ts-lastTs; lastTs=ts;
  const mpf=1000/FPS;
  while(accum>=mpf){ accum-=mpf; frame++; if(frame>=TOTAL) frame=0; }
  renderFrame(frame);
  if(playing) rafId=requestAnimationFrame(loop);
}
function play()   { if(playing)return; playing=true; lastTs=null; accum=0; rafId=requestAnimationFrame(loop); }
function pause()  { playing=false; if(rafId){cancelAnimationFrame(rafId);rafId=null;} }
function restart(){ frame=0; lastTs=null; accum=0; if(!playing) renderFrame(0); }

window.addEventListener('message',e=>{
  if(e.data==='play')    play();
  if(e.data==='pause')   pause();
  if(e.data==='restart') { restart(); play(); }
});

renderFrame(0);
play();
</script>
