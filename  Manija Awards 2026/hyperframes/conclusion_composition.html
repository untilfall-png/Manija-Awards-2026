<!DOCTYPE html>
<html lang="es" data-composition-id="conclusion-epica" data-width="1920" data-height="1080">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manija Awards 2026 - Conclusión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Setup hyperframes
    window.__timelines = window.__timelines || {};
    window.__timelines['conclusion-epica'] = {
      duration: 300,
      layers: []
    };
    
    window.__hf = {
      duration: 300,
      seek: (frame) => renderFrame(frame)
    };

    const ganadores = [
      { cat: 'Mejor Director', ganador: 'Director A', votos: 342, icon: '🎬', color: '#ff00ff' },
      { cat: 'Mejor Actor', ganador: 'Actor X', votos: 289, icon: '🏆', color: '#00ffff' },
      { cat: 'Mejor Actriz', ganador: 'Actriz M', votos: 356, icon: '👑', color: '#ffff00' },
      { cat: 'Mejor Película', ganador: 'Accion Total', votos: 423, icon: '⭐', color: '#00ff88' }
    ];
    
    const totalVotantes = 156;
    const totalVotos = 1245;
    const masVotado = ganadores.reduce((a, b) => a.votos > b.votos ? a : b);

    function renderFrame(frame) {
      const root = document.getElementById('root');
      if (!root) return;

      const laserX = (frame * 3) % 1920;
      const laserRight = (frame * 2) % 1920;
      
      let h = '<div style="width:1920px;height:1080px;background:radial-gradient(ellipse at center, #1a0a2e 0%, #000000 100%);position:relative;overflow:hidden;">';
      
      // Laser effects
      h += '<div style="position:absolute;top:0;left:' + laserX + 'px;width:4px;height:1080px;background:linear-gradient(to bottom,transparent,#ff00ff,#00ffff,transparent);box-shadow:0 0 20px #ff00ff;opacity:0.7;"></div>';
      h += '<div style="position:absolute;top:0;right:' + laserRight + 'px;width:3px;height:1080px;background:linear-gradient(to bottom,transparent,#00ff88,#ff00ff,transparent);box-shadow:0 0 15px #00ff88;opacity:0.6;"></div>';

      // Title (frames 0-60)
      if (frame < 60) {
        var to = Math.min(frame / 30, 1);
        h += '<div style="position:absolute;top:10%;left:50%;transform:translateX(-50%);text-align:center;opacity:' + to + '">';
        h += '<h1 style="font-size:80px;font-weight:bold;background:linear-gradient(90deg,#ff00ff,#00ffff,#ffff00);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 40px rgba(255,0,255,0.8);margin:0;">🏆 MANIJA AWARDS 2026 🏆</h1>';
        h += '<p style="font-size:36px;color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.8);margin:20px 0;">🌟 CONCLUSION DE LA VOTACION 🌟</p>';
        h += '</div>';
      }

      // Champion (frames 60-150)
      if (frame >= 60 && frame < 150) {
        var co = Math.min((frame - 60) / 30, 1);
        var fy = Math.sin(frame * 0.1) * 20;
        h += '<div style="position:absolute;top:25%;left:50%;transform:translateX(-50%);text-align:center;opacity:' + co + '">';
        h += '<div style="font-size:120px;margin-bottom:20px;">⚡</div>';
        h += '<h2 style="font-size:48px;color:#ffff00;text-shadow:0 0 30px #ffff00;margin:10px 0;">GANADOR ABSOLUTO</h2>';
        h += '<h3 style="font-size:64px;color:#fff;text-shadow:0 0 40px #ff00ff;margin:20px 0;font-weight:bold;">' + masVotado.ganador + '</h3>';
        h += '<p style="font-size:32px;color:#00ffff;text-shadow:0 0 20px #00ffff;">' + masVotado.cat + '</p>';
        h += '<div style="font-size:40px;color:#ff00ff;margin-top:20px;">⚡ ' + masVotado.votos + ' VOTOS ⚡</div>';
        h += '</div>';
      }

      // Stats (frames 150-210)
      if (frame >= 150 && frame < 210) {
        var so = Math.min((frame - 150) / 30, 1);
        h += '<div style="position:absolute;top:55%;left:50%;transform:translateX(-50%);display:flex;gap:40px;opacity:' + so + '">';
        h += '<div style="text-align:center;padding:20px;background:rgba(255,0,255,0.2);border:2px solid #ff00ff;border-radius:20px;"><div style="font-size:48px;color:#ff00ff;">👥</div><div style="font-size:36px;color:#fff;font-weight:bold;">' + totalVotantes + '</div><div style="font-size:18px;color:#ccc;">PARTICIPANTES</div></div>';
        h += '<div style="text-align:center;padding:20px;background:rgba(0,255,255,0.2);border:2px solid #00ffff;border-radius:20px;"><div style="font-size:48px;color:#00ffff;">🗳️</div><div style="font-size:36px;color:#fff;font-weight:bold;">' + totalVotos + '</div><div style="font-size:18px;color:#ccc;">VOTOS TOTALES</div></div>';
        h += '<div style="text-align:center;padding:20px;background:rgba(255,255,0,0.2);border:2px solid #ffff00;border-radius:20px;"><div style="font-size:48px;color:#ffff00;">🏆</div><div style="font-size:24px;color:#fff;font-weight:bold;">4 CATEGORIAS</div><div style="font-size:18px;color:#ccc;">PREMIADAS</div></div>';
        h += '</div>';
      }

      // Winners list (frames 210-270)
      if (frame >= 210) {
        var wo = Math.min((frame - 210) / 30, 1);
        h += '<div style="position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:80%;opacity:' + wo + '">';
        h += '<h3 style="font-size:36px;color:#fff;text-align:center;text-shadow:0 0 20px rgba(255,255,255,0.5);margin-bottom:30px;">FELICITACIONES A LOS GANADORES</h3>';
        h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">';
        for (var i = 0; i < ganadores.length; i++) {
          var g = ganadores[i];
          h += '<div style="background:rgba(255,255,255,0.1);border:2px solid ' + g.color + ';border-radius:15px;padding:20px;text-align:center;">';  
          h += '<div style="font-size:40px;margin-bottom:10px;">' + g.icon + '</div>';
          h += '<h4 style="font-size:24px;color:' + g.color + ';margin:10px 0;">' + g.cat + '</h4>';
          h += '<p style="font-size:28px;color:#00ffff;font-weight:bold;">' + g.ganador + '</p>';
          h += '<p style="font-size:20px;color:#ffff00;margin-top:10px;">⚡ ' + g.votos + ' VOTOS ⚡</p>';
          h += '</div>';
        }
        h += '</div></div>';
      }

      // Final message (frames 270-300)
      if (frame >= 270) {
        var fo = Math.min((frame - 270) / 15, 1);
        h += '<div style="position:absolute;bottom:2%;left:50%;transform:translateX(-50%);text-align:center;opacity:' + fo + '">';
        h += '<p style="font-size:28px;color:#00ff88;text-shadow:0 0 20px #00ff88;">LA NOCHE ES NUESTRA</p>';
        h += '<p style="font-size:20px;color:#fff;margin-top:10px;">HASTA EL PROXIMO ANO ⚡🎉</p>';
        h += '</div>';
      }

      h += '<style>@keyframes glow{from{filter:drop-shadow(0 0 20px currentColor)}to{filter:drop-shadow(0 0 40px currentColor)}}</style>';
      h += '</div>';
      
      root.innerHTML = h;
    }

    // Initial render
    renderFrame(0);
  </script>
</body>
</html>
