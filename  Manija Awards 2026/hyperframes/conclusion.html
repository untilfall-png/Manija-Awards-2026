<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manija Awards 2026 - Conclusión</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; }
    canvas { display:block; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { Composition, Layer, Sequence, useCurrentFrame, useVideoConfig } from 'hyperframes';

    // Composición principal: Felicitaciones Épicas
    function ConclusionVideo() {
      const frame = useCurrentFrame();
      const { durationInFrames } = useVideoConfig();

      // Datos de los ganadores (desde los resultados reales)
      const ganadores = [
        { categoria: 'Mejor Director', ganador: 'Director A', votos: 342, icono: '🎬' },
        { categoria: 'Mejor Actor', ganador: 'Actor X', votos: 289, icono: '🏆' },
        { categoria: 'Mejor Actriz', ganador: 'Actriz M', votos: 356, icono: '👑' },
        { categoria: 'Mejor Película', ganador: 'Accion Total', votos: 423, icono: '⭐' },
      ];

      const totalVotantes = 156;
      const totalVotos = 1245;
      const masVotado = ganadores.reduce((a, b) => a.votos > b.votos ? a : b);

      // Animación de rayos láser
      const laserOffset = (frame * 3) % 1080;

      return (
        <Composition
          id="conclusion-epica"
          width={1920}
          height={1080}
          fps={30}
          durationInFrames={300}
          defaultVolume={1}
        >
          {/* Fondo galáctico animado */}
          <Layer zIndex={0}>
            <div style={{
              width: '100%',
              height: '100%',
              background: 'radial-gradient(ellipse at center, #1a0a2e 0%, #000 100%)',
              position: 'relative',
            }}>
              {/* Rayos láser animados */}
              <div style={{
                position: 'absolute',
                top: 0,
                left: `${(frame * 2) % 100}%`,
                width: '4px',
                height: '100%',
                background: 'linear-gradient(to bottom, transparent, #ff00ff, #00ffff, transparent)',
                boxShadow: '0 0 20px #ff00ff, 0 0 40px #00ffff',
                opacity: 0.7,
                animation: 'laserPulse 2s ease-in-out infinite',
              }} />
              <div style={{
                position: 'absolute',
                top: 0,
                right: `${(frame * 1.5) % 100}%`,
                width: '3px',
                height: '100%',
                background: 'linear-gradient(to bottom, transparent, #00ff88, #ff00ff, transparent)',
                boxShadow: '0 0 15px #00ff88',
                opacity: 0.6,
                animation: 'laserPulse 2s ease-in-out infinite 0.5s',
              }} />
              
              {/* Partículas brillantes */}
              {[...Array(50)].map((_, i) => (
                <div key={i} style={{
                  position: 'absolute',
                  left: `${Math.sin(frame * 0.01 + i) * 50 + 50}%`,
                  top: `${(frame * 0.5 + i * 20) % 1080}px`,
                  width: '2px',
                  height: '2px',
                  background: '#fff',
                  borderRadius: '50%',
                  boxShadow: '0 0 10px #fff',
                  opacity: Math.sin(frame * 0.1 + i) * 0.5 + 0.5,
                }} />
              ))}
            </div>
          </Layer>

          {/* Título Principal */}
          <Layer zIndex={10}>
            <div style={{
              position: 'absolute',
              top: '10%',
              left: '50%',
              transform: 'translateX(-50%)',
              textAlign: 'center',
              opacity: frame < 30 ? frame / 30 : 1,
            }}>
              <h1 style={{
                fontSize: '80px',
                fontWeight: 'bold',
                background: 'linear-gradient(90deg, #ff00ff, #00ffff, #ffff00)',
                WebkitBackgroundClip: 'text',
                backgroundClip: 'text',
                color: 'transparent',
                textShadow: '0 0 40px rgba(255,0,255,0.8)',
                margin: 0,
                animation: 'glow 2s ease-in-out infinite alternate',
              }}>
                🏆 MANIJA AWARDS 2026 🏆
              </h1>
              <p style={{
                fontSize: '36px',
                color: '#fff',
                textShadow: '0 0 20px rgba(255,255,255,0.8)',
                margin: '20px 0',
              }}>
                🌟 CONCLUSIÓN DE LA VOTACIÓN 🌟
              </p>
            </div>
          </Layer>

          {/* Sección: Campeón Absoluto */}
          <Layer zIndex={20}>
            <div style={{
              position: 'absolute',
              top: '28%',
              left: '50%',
              transform: 'translateX(-50%)',
              textAlign: 'center',
              opacity: frame > 40 && frame < 120 ? 1 : 0,
              transition: 'opacity 0.5s',
            }}>
              <div style={{
                fontSize: '120px',
                marginBottom: '20px',
                animation: 'float 2s ease-in-out infinite',
              }}>
                ⚡
              </div>
              <h2 style={{
                fontSize: '48px',
                color: '#ffff00',
                textShadow: '0 0 30px #ffff00',
                margin: '10px 0',
              }}>
                🏆 GANADOR ABSOLUTO 🏆
              </h2>
              <h3 style={{
                fontSize: '64px',
                color: '#fff',
                textShadow: '0 0 40px #ff00ff, 0 0 80px #ff00ff',
                margin: '20px 0',
                fontWeight: 'bold',
              }}>
                {masVotado.ganador}
              </h3>
              <p style={{
                fontSize: '32px',
                color: '#00ffff',
                textShadow: '0 0 20px #00ffff',
              }}>
                🎯 {masVotado.categoria}
              </p>
              <div style={{
                fontSize: '40px',
                color: '#ff00ff',
                marginTop: '20px',
                animation: 'pulse 1s ease-in-out infinite',
              }}>
                ⚡ {masVotado.votos} VOTOS ⚡
              </div>
            </div>
          </Layer>

          {/* Indicadores Principales */}
          <Layer zIndex={30}>
            <div style={{
              position: 'absolute',
              top: '55%',
              left: '50%',
              transform: 'translateX(-50%)',
              display: 'flex',
              gap: '40px',
              opacity: frame > 100 && frame < 180 ? 1 : 0,
              transition: 'opacity 0.5s',
            }}>
              <div style={{
                textAlign: 'center',
                padding: '20px',
                background: 'rgba(255,0,255,0.2)',
                border: '2px solid #ff00ff',
                borderRadius: '20px',
                boxShadow: '0 0 30px rgba(255,0,255,0.5)',
              }}>
                <div style={{ fontSize: '48px', color: '#ff00ff' }}>👥</div>
                <div style={{ fontSize: '36px', color: '#fff', fontWeight: 'bold' }}>{totalVotantes}</div>
                <div style={{ fontSize: '18px', color: '#ccc' }}>PARTICIPANTES</div>
              </div>
              
              <div style={{
                textAlign: 'center',
                padding: '20px',
                background: 'rgba(0,255,255,0.2)',
                border: '2px solid #00ffff',
                borderRadius: '20px',
                boxShadow: '0 0 30px rgba(0,255,255,0.5)',
              }}>
                <div style={{ fontSize: '48px', color: '#00ffff' }}>🗳️</div>
                <div style={{ fontSize: '36px', color: '#fff', fontWeight: 'bold' }}>{totalVotos}</div>
                <div style={{ fontSize: '18px', color: '#ccc' }}>VOTOS TOTALES</div>
              </div>
              
              <div style={{
                textAlign: 'center',
                padding: '20px',
                background: 'rgba(255,255,0,0.2)',
                border: '2px solid #ffff00',
                borderRadius: '20px',
                boxShadow: '0 0 30px rgba(255,255,0,0.5)',
              }}>
                <div style={{ fontSize: '48px', color: '#ffff00' }}>🏆</div>
                <div style={{ fontSize: '36px', color: '#fff', fontWeight: 'bold' }}>4 CATEGORÍAS</div>
                <div style={{ fontSize: '18px', color: '#ccc' }}>PREMIADAS</div>
              </div>
            </div>
          </Layer>

          {/* Lista de Ganadores */}
          <Layer zIndex={40}>
            <div style={{
              position: 'absolute',
              bottom: '10%',
              left: '50%',
              transform: 'translateX(-50%)',
              width: '80%',
              opacity: frame > 150 ? 1 : 0,
              transition: 'opacity 0.5s',
            }}>
              <h3 style={{
                fontSize: '36px',
                color: '#fff',
                textAlign: 'center',
                textShadow: '0 0 20px rgba(255,255,255,0.5)',
                marginBottom: '30px',
              }}>
                🎉 FELICITACIONES A LOS GANADORES 🎉
              </h3>
              
              <div style={{
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: '20px',
              }}>
                {ganadores.map((g, i) => (
                  <div key={i} style={{
                    background: 'rgba(255,255,255,0.1)',
                    border: '2px solid #ff00ff',
                    borderRadius: '15px',
                    padding: '20px',
                    textAlign: 'center',
                    boxShadow: '0 0 20px rgba(255,0,255,0.3)',
                    animation: `slideIn 0.5s ease-out ${i * 0.2}s both`,
                  }}>
                    <div style={{ fontSize: '40px', marginBottom: '10px' }}>{g.icono}</div>
                    <h4 style={{ fontSize: '24px', color: '#ff00ff', margin: '10px 0' }}>
                      {g.categoria}
                    </h4>
                    <p style={{ fontSize: '28px', color: '#00ffff', fontWeight: 'bold' }}>
                      {g.ganador}
                    </p>
                    <p style={{ fontSize: '20px', color: '#ffff00', marginTop: '10px' }}>
                      ⚡ {g.votos} VOTOS ⚡
                    </p>
                  </div>
                ))}
              </div>
            </div>
          </Layer>

          {/* Mensaje Final */}
          <Layer zIndex={50}>
            <div style={{
              position: 'absolute',
              bottom: '5%',
              left: '50%',
              transform: 'translateX(-50%)',
              textAlign: 'center',
              opacity: frame > 250 ? 1 : 0,
              transition: 'opacity 0.5s',
            }}>
              <p style={{
                fontSize: '28px',
                color: '#00ff88',
                textShadow: '0 0 20px #00ff88',
                animation: 'glow 2s ease-in-out infinite alternate',
              }}>
                🌟 LA NOCHE ES NUESTRA 🌟
              </p>
              <p style={{ fontSize: '20px', color: '#fff', marginTop: '10px' }}>
                ¡¡¡HASTA EL PRÓXIMO AÑO!!! ⚡🎉
              </p>
            </div>
          </Layer>

          <style>{`
            @keyframes glow {
              from { filter: drop-shadow(0 0 20px currentColor); }
              to { filter: drop-shadow(0 0 40px currentColor); }
            }
            @keyframes pulse {
              0%, 100% { transform: scale(1); }
              50% { transform: scale(1.1); }
            }
            @keyframes float {
              0%, 100% { transform: translateY(0); }
              50% { transform: translateY(-20px); }
            }
            @keyframes laserPulse {
              0%, 100% { opacity: 0.5; }
              50% { opacity: 1; }
            }
            @keyframes slideIn {
              from { opacity: 0; transform: translateY(30px); }
              to { opacity: 1; transform: translateY(0); }
            }
          `}</style>
        </Composition>
      );
    }

    export default ConclusionVideo;
  </script>
</body>
</html>
