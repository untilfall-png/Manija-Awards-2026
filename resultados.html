<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resultados Manija</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_APP.firebaseapp.com",
  projectId: "TU_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("results");

onSnapshot(collection(db, "votos"), (snapshot) => {

  const conteo = {};

  snapshot.forEach(doc => {
    const data = doc.data();
    Object.keys(data).forEach(q => {
      if(q.startsWith("q") && data[q]){
        conteo[data[q]] = (conteo[data[q]] || 0) + 1;
      }
    });
  });

  let html = "";

  Object.entries(conteo)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([name, votos]) => {
      html += `
        <div class="row">
          <span>${name} (${votos})</span>
          <div class="bar" style="width:${votos*40}px"></div>
        </div>
      `;
    });

  container.innerHTML = html;

});
</script>

<style>
body {
  background:#0B0B0D;
  color:white;
  font-family:Arial;
  padding:30px;
}

h1 {
  text-align:center;
  color:#FF2EDB;
}

.row {
  margin:15px 0;
}

.bar {
  height:25px;
  background:linear-gradient(90deg,#FF2EDB,#FF6A00);
  margin-top:5px;
  transition:0.5s;
}
</style>

</head>

<body>
<h1>RESULTADOS EN VIVO 🔥</h1>
<div id="results"></div>
</body>
</html>
